# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT ALT, M, Music TUI, exec, omarchy-launch-or-focus-tui cliamp
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian"
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password
bindd = CTRL, F12, Guake toggle, exec, guake -t

# Unbind keys we are replacing from defaults
unbind = SUPER, S
unbind = SUPER, T
unbind = SUPER, Q
unbind = SUPER, G
unbind = ALT, TAB
unbind = ALT SHIFT, TAB
unbind = SUPER, TAB
unbind = SUPER SHIFT, TAB
unbind = SUPER ALT, TAB
unbind = SUPER ALT SHIFT, TAB
unbind = , PRINT

# Unbind Omarchy tiling defaults to replace with hy3
unbind = SUPER, LEFT
unbind = SUPER, RIGHT
unbind = SUPER, UP
unbind = SUPER, DOWN
unbind = SUPER SHIFT, LEFT
unbind = SUPER SHIFT, RIGHT
unbind = SUPER SHIFT, UP
unbind = SUPER SHIFT, DOWN
unbind = SUPER, J
unbind = SUPER, mouse:272

# hy3: group creation (i3-style splits and tabs)
bindd = SUPER, H, Make horizontal split, hy3:makegroup, h
bindd = SUPER, G, Make vertical split, hy3:makegroup, v
bindd = SUPER, T, Make tab group, hy3:makegroup, tab
bindd = SUPER, Q, Toggle group tabbed/untabbed, hy3:changegroup, toggletab

# hy3: change existing group layout
bindd = SUPER SHIFT, H, Change group to horizontal, hy3:changegroup, h
bindd = SUPER SHIFT, G, Change group to vertical, hy3:changegroup, v
bindd = SUPER SHIFT, T, Change group to tabbed, hy3:changegroup, tab
bindd = SUPER SHIFT, Q, Toggle group orientation, hy3:changegroup, opposite

# hy3: focus movement
bindd = SUPER, LEFT, Focus left, hy3:movefocus, l
bindd = SUPER, RIGHT, Focus right, hy3:movefocus, r
bindd = SUPER, UP, Focus up, hy3:movefocus, u
bindd = SUPER, DOWN, Focus down, hy3:movefocus, d

# hy3: move windows in tree
bindd = SUPER SHIFT, LEFT, Move window left, hy3:movewindow, l
bindd = SUPER SHIFT, RIGHT, Move window right, hy3:movewindow, r
bindd = SUPER SHIFT, UP, Move window up, hy3:movewindow, u
bindd = SUPER SHIFT, DOWN, Move window down, hy3:movewindow, d

# hy3: tab cycling within a tabbed group
bindd = SUPER, TAB, Next tab, hy3:focustab, r, wrap
bindd = SUPER SHIFT, TAB, Previous tab, hy3:focustab, l, wrap
# repeat for ALT, so if mess my fingers I still can cycle
bindd = ALT, TAB, Next tab, hy3:focustab, r, wrap
bindd = ALT SHIFT, TAB, Previous tab, hy3:focustab, l, wrap

# Mouse
bindmd = SUPER, mouse:272, Move window, hy3:movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

# Scratchpad
bindd = SUPER, MINUS, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER SHIFT, MINUS, Move window to scratchpad, movetoworkspacesilent, special:scratchpad
bindd = SUPER ALT, MINUS, Extract window from scratchpad, exec, omarchy-hyprland-scratchpad-extract

# Remap Print Screen to require Ctrl
bindd = CTRL, PRINT, Screenshot, exec, omarchy-capture-screenshot

# Move original togglefloating to free key
bindd = SUPER CTRL, T, Toggle window floating/tiling, togglefloating,

# Add extra bindings
# bind = SUPER SHIFT, R, exec, alacritty -e ssh your-server

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

